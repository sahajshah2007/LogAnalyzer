title: Password Cracking and Hash Dumping
id: f8a9b0c1-d2e3-4567-fabc-678901234567
status: stable
description: Detects password cracking tools, hash extraction utilities, and offline password attack techniques.
author: Log analyzer
date: 2026/04/01
references:
  - https://attack.mitre.org/techniques/T1110/002/
tags:
  - attack.credential_access
  - attack.t1110.002
logsource:
  category: linux
  product: process_creation
detection:
  keywords:
    - "hashcat"
    - "john"
    - "john the ripper"
    - "johntheripper"
    - "hydra"
    - "medusa"
    - "ncrack"
    - "patator"
    - "crowbar"
    - "thc-hydra"
    - "ophcrack"
    - "rainbowcrack"
    - "fcrackzip"
    - "pdfcrack"
    - "aircrack"
    - "aircrack-ng"
    - "hashid"
    - "hash-identifier"
    - "unshadow"
    - "pwdump"
    - "fgdump"
    - "cachedump"
    - "lsadump"
    - "ntdsutil"
    - "ntds.dit"
    - "SYSTEM hive"
    - "SAM hive"
    - "reg save HKLM"
    - "secretsdump"
    - "impacket-secretsdump"
    - "crackmapexec"
    - "cme smb"
  condition: keywords
fields:
  - user
  - process
level: critical
falsepositives:
  - Authorized penetration testing
  - Security audits
