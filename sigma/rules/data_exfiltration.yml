title: Data Exfiltration Attempt
id: d56be08f-20a3-4491-9f74-aaae95094c16
status: stable
description: Detects indicators of data exfiltration via network, DNS, or file transfer mechanisms.
author: Log analyzer
date: 2026/03/01
references:
  - https://attack.mitre.org/techniques/T1048/
tags:
  - attack.exfiltration
  - attack.t1048
logsource:
  category: linux
  product: network
detection:
  keywords:
    - "scp "
    - "sftp"
    - "rsync"
    - "rclone"
    - "aws s3 cp"
    - "aws s3 sync"
    - "gsutil cp"
    - "azcopy"
    - "ftp put"
    - "ftp mput"
    - "curl -T"
    - "curl --upload"
    - "wget --post-file"
    - "nc.*< "
    - "tar.*|.*nc"
    - "openssl.*s_client"
    - "xxd"
    - "base64.*>"
    - "exfil"
    - "megacmd"
    - "rclone copy"
  condition: keywords
fields:
  - source_ip
  - dest_ip
  - user
level: high
falsepositives:
  - Legitimate file transfers and backups
  - Cloud sync operations
