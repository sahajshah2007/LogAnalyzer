title: Credential Dumping and Harvesting
id: ba325bc2-73e8-41ab-829a-afdd320186d4
status: stable
description: Detects credential dumping techniques targeting password stores, tokens, and cached credentials.
author: Log analyzer
date: 2026/03/01
references:
  - https://attack.mitre.org/techniques/T1003/008/
tags:
  - attack.credential_access
  - attack.t1003.008
logsource:
  category: linux
  product: auth
detection:
  keywords:
    - "/etc/shadow"
    - "/etc/passwd"
    - "unshadow"
    - "cat /etc/shadow"
    - "cat /etc/passwd"
    - ".bash_history"
    - ".ssh/id_rsa"
    - ".ssh/authorized_keys"
    - "credentials"
    - "access_token"
    - "api_key"
    - "AWS_SECRET"
    - "AWS_ACCESS_KEY"
    - "PRIVATE KEY"
    - "secret_key"
    - ".gnupg"
    - "keychain"
    - "credential-store"
    - "git-credentials"
    - "wallet.dat"
    - "KeePass"
    - ".kdbx"
    - "LastPass"
  condition: keywords
fields:
  - source_ip
  - user
level: critical
falsepositives:
  - Legitimate system administration tasks
  - Password management by authorized users
