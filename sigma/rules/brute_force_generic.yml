title: Generic Brute Force Authentication Attack
id: a1b2c3d4-e5f6-7890-abcd-ef1234567890
status: stable
description: Detects brute force authentication attempts against various services including FTP, SMTP, RDP, and web applications.
author: Log analyzer
date: 2026/04/01
references:
  - https://attack.mitre.org/techniques/T1110/
tags:
  - attack.credential_access
  - attack.t1110
logsource:
  category: linux
  product: auth
detection:
  keywords:
    - "authentication failed"
    - "authentication failure"
    - "login failed"
    - "login attempt"
    - "invalid password"
    - "wrong password"
    - "bad password"
    - "incorrect password"
    - "password mismatch"
    - "account locked"
    - "too many failed"
    - "maximum retries"
    - "brute force"
    - "credential stuffing"
    - "password spray"
    - "multiple failed"
    - "repeated login"
    - "login blocked"
    - "auth blocked"
    - "rate limit exceeded"
  condition: keywords
fields:
  - source_ip
  - user
level: high
falsepositives:
  - Legitimate users forgetting passwords
  - Misconfigured applications
