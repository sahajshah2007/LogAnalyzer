title: Cloud Credential and Metadata Service Abuse
id: e1f2a3b4-c5d6-7890-efab-901234567890
status: stable
description: Detects abuse of cloud metadata services, credential theft from cloud environments, and unauthorized cloud API access.
author: Log analyzer
date: 2026/04/01
references:
  - https://attack.mitre.org/techniques/T1552/005/
tags:
  - attack.credential_access
  - attack.t1552.005
logsource:
  category: linux
  product: network
detection:
  keywords:
    - "169.254.169.254"
    - "metadata.google.internal"
    - "metadata/computeMetadata"
    - "metadata/instance"
    - "imds"
    - "IMDSv1"
    - "IMDSv2"
    - "iam/security-credentials"
    - "latest/meta-data"
    - "latest/user-data"
    - "AWS_ACCESS_KEY_ID"
    - "AWS_SECRET_ACCESS_KEY"
    - "AWS_SESSION_TOKEN"
    - "GOOGLE_APPLICATION_CREDENTIALS"
    - "AZURE_CLIENT_SECRET"
    - "aws sts get-caller-identity"
    - "aws iam list-users"
    - "aws s3 ls"
    - "gcloud auth"
    - "az login"
    - "az account"
    - "boto3"
    - "botocore"
    - "pacu"
    - "cloudsploit"
    - "ScoutSuite"
    - "prowler"
    - "cloudmapper"
  condition: keywords
fields:
  - source_ip
  - user
level: critical
falsepositives:
  - Legitimate cloud SDK usage
  - DevOps automation scripts
